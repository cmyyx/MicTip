name: Release

# 推送 v* 开头的 tag 时触发发版
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 创建 Release 及上传资产需要

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          # tag 形如 v0.1.0 → 0.1.0
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v', 'V')
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $ver"

      - name: Inject version into csproj
        shell: pwsh
        run: |
          $csproj = "src/MicTip/MicTip.csproj"
          $ver = "${{ steps.ver.outputs.version }}"
          (Get-Content $csproj) -replace '<Version>.*?</Version>', "<Version>$ver</Version>" | Set-Content $csproj
          echo "Updated $csproj to version $ver"

      - name: Publish Self-Contained
        run: dotnet publish src/MicTip -c Release -p:PublishProfile=SelfContained --nologo -v q

      - name: Publish Framework-Dependent
        run: dotnet publish src/MicTip -c Release -p:PublishProfile=FrameworkDependent --nologo -v q

      - name: Rename exes with version
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $sc = "src/MicTip/bin/publish/self-contained/MicTip.exe"
          $fd = "src/MicTip/bin/publish/framework-dependent/MicTip.exe"
          Copy-Item $sc "MicTip-self-contained-v$ver.exe"
          Copy-Item $fd "MicTip-framework-dependent-v$ver.exe"
          echo "Renamed exes:"
          Get-ChildItem "MicTip-*.exe" | Format-Table Name, Length

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          # 获取版本号排序的标签列表，找到上一个标签
          $tags = git tag --sort=-version:refname
          $currentTag = "${{ github.ref_name }}"
          $prevTag = $tags | Where-Object { $_ -ne $currentTag } | Select-Object -First 1

          $repoUrl = "${{ github.server_url }}/${{ github.repository }}"

          # 收集 commit 日志
          if ($prevTag) {
            $log = git log "$prevTag..HEAD" --oneline --no-decorate
          } else {
            $log = git log --oneline --no-decorate
          }

          $body = "## 更新内容`n`n"
          foreach ($line in $log) {
            if ($line -match '^(\w+)\s(.+)') {
              $sha = $matches[1]
              $msg = $matches[2]
              $body += "- $msg [$sha]($repoUrl/commit/$sha)`n"
            }
          }

          # 写入多行输出
          $delimiter = "RELEASE_NOTES_EOF"
          "body<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            MicTip-self-contained-v${{ steps.ver.outputs.version }}.exe
            MicTip-framework-dependent-v${{ steps.ver.outputs.version }}.exe
